name: Deploy Full Stack

on:
  push:
    branches:
      - main # Change if your default branch is 'master'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        # You need to add DOCKER_USERNAME and DOCKER_PASSWORD to your GitHub Repository Secrets
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        run: |
          cd frontend
          docker build --build-arg VITE_API_URL=https://api.samjnaanalytics.ai/ -t molletidinesh/frontend:latest .
          docker push molletidinesh/frontend:latest

      - name: Build and Push Backend
        run: |
          cd backend
          docker build -t molletidinesh/medical-backend:latest .
          docker push molletidinesh/medical-backend:latest

  deploy_to_vm:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          # You need to add SERVER_IP and SERVER_PASSWORD to your GitHub Repository Secrets
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # 1. Stop and remove existing containers (|| true prevents the script from failing if they don't exist yet)
            docker stop project-frontend medical-backend || true
            docker rm project-frontend medical-backend || true
            
            # 2. Pull the newly built images from Docker Hub
            docker pull molletidinesh/frontend:latest
            docker pull molletidinesh/medical-backend:latest
            
            # 3. Run Medical Backend
            docker run -d \
              --name medical-backend \
              --network web-net \
              --restart always \
              -p 5000:5000 \
              -e PORT=5000 \
              -e NODE_ENV=production \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e FRONTEND_URL="https://app.samjnaanalytics.ai" \
              molletidinesh/medical-backend:latest
              
            # 4. Run Frontend
            docker run -d \
              --restart unless-stopped \
              --name project-frontend \
              --network web-net \
              -p 4000:3000 \
              molletidinesh/frontend:latest
            
            # 5. Restart Caddy to pick up any changes
            docker restart gateway_caddy_1
            
            # Wait a few seconds for containers to initialize
            sleep 5
            
            # 6. Verify Health
            curl -I https://app.samjnaanalytics.ai
            curl -I https://api.samjnaanalytics.ai
