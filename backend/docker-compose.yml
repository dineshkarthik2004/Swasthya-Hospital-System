services:
  backend:
    build: .
    image: molletidinesh/medical-backend:latest # Replace with your Docker Hub username
    container_name: medical-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    networks:
      - medical-network

networks:
  medical-network:
    driver: bridge
